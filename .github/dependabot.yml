version: 2

# Keeps the SHA-pinned GitHub Actions current (and the Dockerfile base images).
# Without this, pinning to a commit SHA freezes the action forever; Dependabot
# opens PRs that bump the SHA and update the trailing `# vX.Y.Z` comment.
updates:
  - package-ecosystem: github-actions
    # Covers every workflow under .github/workflows/.
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      # `deps:` is a releasable unit here, so an action bump cuts a patch release.
      prefix: deps
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: deps
