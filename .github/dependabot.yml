version: 2

updates:
  # GitHub Actions are pinned to major tags (e.g. actions/checkout@v6). We only
  # want PRs when a NEW MAJOR ships (v6 → v7) — a major tag already floats across
  # its own minor/patch releases, so a v6 → v6.0.3 PR is pure noise. The `ignore`
  # block below drops minor + patch, leaving major-only bumps.
  - package-ecosystem: github-actions
    # Covers every workflow under .github/workflows/.
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      # `deps:` is a releasable unit here, so a major action bump cuts a patch release.
      prefix: deps
    groups:
      actions:
        patterns: ["*"]
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-minor
          - version-update:semver-patch

  # Dockerfile base image (python:3.14-slim). The project is pinned to Python
  # 3.14 (.python-version, requires-python <3.15, Dockerfile UV_PYTHON=
  # python3.14 + UV_PYTHON_DOWNLOADS=never), so a 3.15 base would break `uv sync`
  # ("no 3.14 interpreter"). The `3.14-slim` tag already floats to the latest
  # 3.14.x patch at build time, so block the Python minor/major bump here — bump
  # to the next Python minor deliberately (it's a coordinated multi-file change).
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: deps
    ignore:
      - dependency-name: python
        update-types:
          - version-update:semver-major
          - version-update:semver-minor

  # Python dependencies (uv.lock). Without this the lockfile drifts and security
  # fixes never land. Grouped into one weekly PR; `deps:` so a bump cuts a patch.
  - package-ecosystem: uv
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: deps
    groups:
      python:
        patterns: ["*"]
