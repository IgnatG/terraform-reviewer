name: release-please

run-name: "Release-please · ${{ github.ref_name }}"

# Automated releases from Conventional Commits (https://www.conventionalcommits.org).
# release-please keeps an open "release PR" that accumulates the changelog +
# version bumps; merging it cuts the release:
#   1. release-please  — creates the GitHub release + the exact vX.Y.Z git tag,
#      bumps pyproject + CHANGELOG, and (via extra-files) the image pin in
#      terraform-review.yml.
#   2. tag-major       — moves the vX major-float git tag to the new release, so
#      consumers can pin `uses: ...@v1` (auto-updates within the major) OR
#      `@v1.2.3` (exact). Both refs exist.
#   3. build-image     — builds + pushes the image as :vX.Y.Z + :vX + :latest.
#      Chained here (not a tag-push trigger) because a tag created with
#      GITHUB_TOKEN doesn't trigger other workflows.
#
# Requires repo Settings → Actions → General → "Allow GitHub Actions to create
# and approve pull requests" (so the release PR can be opened). To run CI on the
# release PR itself, swap the default token for a PAT (see token note below).

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

# Serialise release runs on main — two quick pushes shouldn't race two release
# PRs. Don't cancel in-progress: a half-finished release (tag pushed, image not)
# is worse than waiting.
concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
      major: ${{ steps.rp.outputs.major }}
      minor: ${{ steps.rp.outputs.minor }}
      version: ${{ steps.rp.outputs.version }}
      # Set when a release PR is opened OR updated; `pr` carries that PR's JSON
      # (incl. headBranchName) so sync-lock can re-lock on the right branch.
      prs_created: ${{ steps.rp.outputs.prs_created }}
      pr: ${{ steps.rp.outputs.pr }}
    steps:
      # RELEASE_PAT (a PAT with contents + pull-requests scope) makes the release
      # PR run CI AND lets release-please open the PR without the org/repo
      # "Allow GitHub Actions to create and approve pull requests" toggle. The
      # chained jobs below run in THIS run regardless (a token-created tag can't
      # trigger a fresh workflow). If the PAT is ever removed, drop the `token:`
      # line and flip that repo toggle instead.
      - uses: googleapis/release-please-action@v5
        id: rp
        with:
          token: ${{ secrets.RELEASE_PAT }}
          target-branch: main
        # config-file + manifest-file default to release-please-config.json and
        # .release-please-manifest.json, which we ship at the repo root.

  sync-lock:
    # release-please bumps `version` in pyproject.toml but NOT uv.lock, so the
    # lockfile's own package version drifts on the release PR and CI's
    # `uv lock --check` (make lint) fails. release-please can't fix this itself:
    # its generic updater needs an `x-release-please-version` annotation, which
    # `uv lock` strips on any real rewrite (e.g. a Dependabot bump), so the marker
    # never survives (googleapis/release-please#2561). Instead we re-lock on the
    # release branch — `uv lock` writes the bumped pyproject version into uv.lock —
    # and push it back with the PAT so CI re-runs and goes green. Runs after
    # release-please has (re)written the branch; the push lands on the release
    # branch (not main), so it doesn't re-trigger this workflow — no loop.
    needs: release-please
    if: needs.release-please.outputs.prs_created == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ fromJSON(needs.release-please.outputs.pr).headBranchName }}
          # Push back with the PAT (not GITHUB_TOKEN) so the commit re-triggers CI.
          token: ${{ secrets.RELEASE_PAT }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8

      - name: Re-lock against the bumped pyproject version
        run: uv lock

      - name: Commit the synced lockfile (only if it changed)
        run: |
          set -euo pipefail
          if git diff --quiet uv.lock; then
            echo "uv.lock already in sync — nothing to do."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add uv.lock
          git commit -m "deps: sync uv.lock to the release version"
          git push

  tag-floats:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Move the major + minor float tags to the new release
        # GitHub recommends keeping BOTH the major (vX) and minor (vX.Y) tags
        # current to the latest appropriate commit, so consumers can pin `@v1`
        # (any 1.x.y), `@v1.2` (any 1.2.x), or `@v1.2.3` (exact). The exact tag is
        # release-please's; these floats are moved here.
        env:
          MAJOR: ${{ needs.release-please.outputs.major }}
          MINOR: ${{ needs.release-please.outputs.minor }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch --tags --force
          for float in "v${MAJOR}" "v${MAJOR}.${MINOR}"; do
            git tag -f "$float" "${TAG}"
            git push -f origin "$float"
          done

  build-image:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/build-image.yml
    with:
      version: ${{ needs.release-please.outputs.version }}
