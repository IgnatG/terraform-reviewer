name: terraform-review

# Reusable workflow (workflow_call) that runs the LangGraph Terraform reviewer
# inside the prebuilt GHCR image and posts a single sticky PR comment. Consumers
# call it from their own `pull_request` workflow — see examples/example-caller.yml.
#
# The review is always keyed off a PR *number* (from the event or the pr-number
# input) and checks out that PR's merge ref, so a workflow_dispatch rerun reviews
# the PR rather than whatever branch was selected for the manual run.
#
# The image bundles terraform/tfsec/tflint/infracost/checkov + trivy, so there
# are no per-run scanner installs. Scanner versions are pinned in the image, not
# here.

on:
  workflow_call:
    inputs:
      llm-provider:
        description: "LLM provider: openai | anthropic | google."
        type: string
        default: openai
      llm-model:
        description: "Model id — must match the provider (default suits openai)."
        type: string
        default: gpt-4o
      enable-llm-findings:
        description: >-
          Let the LLM propose findings the scanners didn't catch (shown as ◐
          Evidence). Off by default keeps the finding set deterministic — the LLM
          only rewords scanner findings. true = more coverage, less run-to-run
          consistency. Scopes to the PR's changed files; set llm-full-review below
          for a whole-codebase pass.
        type: boolean
        default: false
      llm-full-review:
        description: >-
          Whole-codebase LLM review: when true the LLM is fed every Terraform file
          in the repo (not just the diff) and discovery is forced on, regardless
          of enable-llm-findings. Costs more tokens and is less reproducible than
          the diff-scoped default, so it's off by default.
        type: boolean
        default: false
      fail-on-severity:
        description: >-
          Gate CI when a finding meets/exceeds this floor:
          critical | high | medium | low | info | none. Default never fails.
        type: string
        default: none
      fail-on-ai-error:
        description: >-
          Fail the check (red ✗) when a *configured* AI call failed this run —
          bad key, exhausted credits, unsupported model. The deterministic
          scanner report still posts either way; AI failures are always shown as
          an annotation regardless. Off by default so a transient LLM blip can't
          block PRs.
        type: boolean
        default: false
      scan-mode:
        description: >-
          "full" (default) reviews the whole repo (posture scan); "diff" scopes
          scanner findings to the files this PR changed.
        type: string
        default: full
      inline-comments:
        description: >-
          Post a PR review with a comment on each finding that sits on a changed
          line (on by default). Findings off the diff stay in the sticky summary.
        type: boolean
        default: true
      tflint-init:
        description: >-
          Run `tflint --init` when the repo has a `.tflint.hcl`. OFF by default:
          `--init` downloads and EXECUTES the plugins that file declares, so a
          malicious PR could run arbitrary code. Enable only if you trust the
          repo's `.tflint.hcl`. With it off, tflint's built-in rules still run.
        type: boolean
        default: false
      terraform-standard:
        description: >-
          A1 Terraform Standardiser: "default" for the built-in house standard,
          or a repo-relative path to a custom definition JSON. Empty = off.
        type: string
        default: ""
      cicd-standard:
        description: >-
          A2 CI/CD Standardiser: "default" for the built-in baseline, or a
          repo-relative path to a custom definition JSON. Empty = off.
        type: string
        default: ""
      enabled-rule-packs:
        description: >-
          Map findings to a named standard's controls + add ○ Human-only gap
          detection for missing expected artefacts. Empty = off; "*" = all
          shipped packs; or a CSV of pack ids (e.g. "terraform-cis-aws").
        type: string
        default: ""
      coverage-report-path:
        description: >-
          A3: path to a coverage report (lcov/cobertura/jacoco) your CI produced.
          Empty = the coverage lens is off.
        type: string
        default: ""
      jscpd-report-path:
        description: "A4: path to a jscpd duplication JSON report. Empty = skip."
        type: string
        default: ""
      sonarqube-sarif-path:
        description: "A4: path to a SonarQube SARIF export. Empty = skip."
        type: string
        default: ""
      pr-number:
        description: >-
          PR to review. Defaults to the triggering pull_request event; pass it
          explicitly for workflow_dispatch runs, which carry no PR context.
        type: string
        default: ""
    secrets:
      openai-api-key:
        required: false
      anthropic-api-key:
        required: false
      google-api-key:
        required: false
      infracost-api-key:
        description: "Enables the cost agent; it is skipped when unset."
        required: false
      github-token:
        description: "Defaults to the caller's github.token when unset."
        required: false

# One in-flight review per PR; a new push (or rerun) cancels the previous one.
# Keyed off the PR number so dispatch reruns and pull_request runs share a group.
concurrency:
  group: terraform-review-${{ inputs.pr-number || github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    # Cap a hung LLM/scanner call instead of letting it run to the 6h default —
    # this burns the *consumer's* Actions minutes, so keep it tight.
    timeout-minutes: 20

    permissions:
      contents: read
      pull-requests: write
      security-events: write # upload the SARIF to the code-scanning tab

    container:
      # Major float: always the latest v1.x.y image (build-image keeps :v1 in
      # sync). Pinned here rather than the exact version because release-please
      # can't commit to .github/workflows/ (no `workflow` token scope), so it
      # can't bump an exact pin. Consumers still pin reproducibly via the git ref
      # (uses: ...@v1.2.3); the image tracks the major.
      image: ghcr.io/ignatg/terraform-reviewer:v1
      # The image ships a non-root `app` user, but GitHub-hosted container jobs
      # mount the workspace (and the $GITHUB_ENV/$GITHUB_OUTPUT command files) as
      # uid 1001, which a non-root container user cannot write. Run as root so
      # checkout, the infracost worktree, and the review can read/write them.
      # (For a *private* image, add a `credentials:` block here.)
      options: --user root

    env:
      # Provider selection + secrets, read by config.Settings inside the image.
      DEFAULT_LLM_PROVIDER: ${{ inputs.llm-provider }}
      DEFAULT_LLM_MODEL: ${{ inputs.llm-model }}
      ENABLE_LLM_FINDINGS: ${{ inputs.enable-llm-findings }}
      LLM_FULL_REVIEW: ${{ inputs.llm-full-review }}
      FAIL_ON_SEVERITY: ${{ inputs.fail-on-severity }}
      FAIL_ON_AI_ERROR: ${{ inputs.fail-on-ai-error }}
      SCAN_MODE: ${{ inputs.scan-mode }}
      INLINE_COMMENTS: ${{ inputs.inline-comments }}
      TFLINT_INIT: ${{ inputs.tflint-init }}
      # Wedge lenses (Phase 5) — off unless the caller names a definition.
      TERRAFORM_STANDARD: ${{ inputs.terraform-standard }}
      CICD_STANDARD: ${{ inputs.cicd-standard }}
      # Standard-mapping + gap layer (Phase 4) — off unless packs are named.
      ENABLED_RULE_PACKS: ${{ inputs.enabled-rule-packs }}
      # Repo lenses (Phase 7) — each off unless its definition/report is supplied.
      COVERAGE_REPORT_PATH: ${{ inputs.coverage-report-path }}
      JSCPD_REPORT_PATH: ${{ inputs.jscpd-report-path }}
      SONARQUBE_SARIF_PATH: ${{ inputs.sonarqube-sarif-path }}
      OPENAI_API_KEY: ${{ secrets.openai-api-key }}
      ANTHROPIC_API_KEY: ${{ secrets.anthropic-api-key }}
      GOOGLE_API_KEY: ${{ secrets.google-api-key }}
      INFRACOST_API_KEY: ${{ secrets.infracost-api-key }}
      GITHUB_TOKEN: ${{ secrets.github-token || github.token }}

    steps:
      - name: Resolve PR number
        # Explicit input wins; fall back to the pull_request event. On
        # workflow_dispatch the event carries no PR, so the input is required.
        env:
          PR_NUMBER: ${{ inputs.pr-number || github.event.pull_request.number }}
        run: |
          set -uo pipefail
          if [ -z "$PR_NUMBER" ]; then
            echo "no PR number resolved; pass the 'pr-number' input for manual runs" >&2
            exit 1
          fi
          echo "PR_NUMBER=$PR_NUMBER" >> "$GITHUB_ENV"

      - name: Checkout the PR merge ref (full history for infracost base diff)
        uses: actions/checkout@v6
        with:
          # Review the PR by number, never the triggering ref — otherwise a
          # workflow_dispatch rerun would scan the selected branch (e.g. main)
          # instead of the PR. refs/pull/<n>/merge is the same ref a pull_request
          # event checks out by default. fetch-depth: 0 keeps the merge commit's
          # base parent (HEAD^1) reachable — the cost agent prices it for the
          # infracost diff.
          ref: refs/pull/${{ env.PR_NUMBER }}/merge
          fetch-depth: 0

      - name: Review Terraform changes
        # PR_NUMBER is exported via $GITHUB_ENV by the resolve step above.
        # Writes ./findings.json (the versioned output contract) alongside the
        # sticky comment; the upload step below publishes it as an artefact.
        run: |
          python -m terraform_review_agent.entrypoint \
            --repository "$GITHUB_REPOSITORY" \
            --pr-number "$PR_NUMBER"

      - name: Upload findings + evidence pack artefacts
        # Always upload, even when the review gates CI (exit 2) — the findings
        # report is the contract downstream consumers (dashboard, Remediator) read,
        # and the evidence pack (HTML/CSV) is the downloadable ✅/◐/○ deliverable.
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: terraform-review-findings
          path: |
            findings.json
            findings.sarif
            findings.csv
            evidence-pack.html
          if-no-files-found: warn

      - name: Upload SARIF to code-scanning
        # Lands the findings in the repo's Security → Code scanning tab + inline
        # PR annotations. Best-effort: never fail the review if the upload can't run.
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: findings.sarif
