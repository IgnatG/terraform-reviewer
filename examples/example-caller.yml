name: example-caller

# DOCS-ONLY sample showing how a consumer repo wires up the reusable reviewer.
# It lives in examples/ (NOT .github/workflows/) on purpose, so GitHub does not
# execute it in this repo. Copy it into your own .github/workflows/ and point
# `uses:` at a pinned version tag.
#
# The `paths` filter lives here, on the trigger — it decides whether a review
# runs at all. The reviewer additionally early-exits if no Terraform files
# actually changed, so this filter is just to avoid spinning up the job.
#
# ⚠️ SECURITY: trigger on `pull_request`, NEVER `pull_request_target`. A fork PR
# runs untrusted code; `pull_request_target` would expose your repo secrets
# (incl. the LLM key) to it. `pull_request` runs with a read-only token and no
# secrets for fork PRs, which is what you want. See the README "Security" section.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    # Mirror the reviewer's recognized Terraform suffixes (TERRAFORM_SUFFIXES in
    # state.py): HCL and the JSON variants. `*.tf` does NOT match `*.tf.json`.
    paths:
      - "**/*.tf"
      - "**/*.tfvars"
      - "**/*.tf.json"
      - "**/*.tfvars.json"
  workflow_dispatch: # manual re-run
    inputs:
      pr-number:
        description: "PR number to review (required — dispatch has no PR context)."
        required: true
        type: string

jobs:
  terraform-review:
    # Pin at any level: @v1 (any 1.x.y) · @v1.2 (any 1.2.x) · @v1.2.3 (exact,
    # fully reproducible). @v1 only jumps to @v2 on a breaking release.
    uses: IgnatG/terraform-reviewer/.github/workflows/terraform-review.yml@v1
    permissions:
      contents: read
      pull-requests: write
      security-events: write # so the SARIF lands in the Security → Code scanning tab
    # Full input reference — each shown at (or with) its default. Set only the
    # ones you want to change; the rest fall back to these.
    with:
      # ── LLM (rewords scanner findings into clear sentences) ──────────────────
      llm-provider: anthropic # default: openai · openai | anthropic | google
      llm-model: claude-sonnet-4-6 # default: gpt-4o · must match llm-provider
      # NOTE: your LLM key already rewords every scanner finding into a clear
      # sentence on every run — that's its main job, no toggle needed. This is the
      # *separate* switch for letting the LLM also PROPOSE findings the scanners
      # missed (◐ Evidence): default false to keep the finding set deterministic;
      # true trades reproducibility for extra coverage. This scopes the LLM to the
      # PR's CHANGED files; for a whole-repo LLM pass, set llm-full-review below.
      enable-llm-findings: false
      # Whole-codebase LLM review: when true the LLM reviews every .tf file in the
      # repo (not just the diff), discovery forced on (supersedes
      # enable-llm-findings). Costs more tokens; off by default.
      llm-full-review: false # default: false

      # ── CI gating & scan scope ───────────────────────────────────────────────
      fail-on-severity: high # default: none · critical|high|medium|low|info|none
      # Fail the check when a configured AI call fails (bad key/credits/model)
      # instead of passing green. AI failures always annotate regardless.
      fail-on-ai-error: false # default: false
      scan-mode: full # default: full (whole-repo posture) · diff (changed files only)
      inline-comments: true # default: true · one PR comment per finding on a changed line
      # SECURITY: `tflint --init` downloads + runs the plugins a repo's .tflint.hcl
      # declares — a malicious PR could run arbitrary code. Off by default; enable
      # only for repos whose .tflint.hcl you trust.
      tflint-init: false # default: false

      # ── Deterministic lenses (no AI key needed) ──────────────────────────────
      # "" = off · "default" = built-in golden standard · or a path to your own JSON
      # (e.g. terraform-standard: .assessor/terraform-house.json). See examples/README.md.
      terraform-standard: default # default: "" · A1 module structure + terraform{} blocks
      cicd-standard: default # default: "" · A2 .github/workflows posture (SHA pins, perms)
      # default: "". Maps findings to a standard's controls + adds ○ Human-only gap
      # detection. "*" = all shipped packs · CSV of ids, e.g. "terraform-cis-aws".
      enabled-rule-packs: ""

      # ── External report ingestion (off unless you pass a path) ───────────────
      coverage-report-path: "" # default: "" · A3 lcov/cobertura/jacoco your CI produced
      jscpd-report-path: "" # default: "" · A4 jscpd duplication JSON
      sonarqube-sarif-path: "" # default: "" · A4 SonarQube SARIF export

      # pull_request runs read the event; manual runs use the dispatch input.
      pr-number: ${{ github.event.pull_request.number || inputs.pr-number }}
    secrets:
      # One LLM key, matching llm-provider above:
      anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
      # openai-api-key: ${{ secrets.OPENAI_API_KEY }}
      # google-api-key: ${{ secrets.GOOGLE_API_KEY }}
      infracost-api-key: ${{ secrets.INFRACOST_API_KEY }} # enables the 💰 cost lens
      # github-token: defaults to the caller's github.token; override for broader scope.
